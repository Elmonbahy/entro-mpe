services:
  mysql:
    image: mysql:8.4.3
    container_name: apm_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: apm_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: root # set root user
      PMA_PASSWORD: root # set root password same as MYSQL_ROOT_PASSWORD
      UPLOAD_LIMIT: 20M # Set the maximum upload file size & maximum POST size
    ports:
      - "8080:80"
    depends_on:
      - mysql
